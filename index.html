<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密室逃脫：文字提示解碼器</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22; 
            --success: #2ecc71; /* 綠燈 */
            --warning: #f1c40f; /* 黃燈 */
            --danger: #e74c3c;  /* 紅燈 */
            --panel: #34495e;
        }

        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .escape-container {
            background: var(--panel);
            width: 95%;
            max-width: 650px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
            border: 5px solid #555;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
        }

        #timer { color: var(--danger); font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: bold; }
        #round-text { color: var(--accent); font-size: 1.5rem; font-weight: bold; }

        h1 { font-size: 2.5rem; margin: 10px 0; color: #fff; text-shadow: 0 0 10px var(--accent); }

        .lock-row { display: flex; gap: 15px; justify-content: center; margin: 25px 0; }
        .key-input {
            width: 90px; height: 110px;
            font-size: 4rem;
            text-align: center;
            border: 4px solid #777;
            border-radius: 15px;
            background: #111;
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .key-input:focus { outline: none; border-color: #fff; box-shadow: 0 0 20px var(--accent); }

        .decode-btn {
            width: 100%;
            padding: 20px;
            font-size: 2.2rem;
            font-weight: bold;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #a05a1a;
            transition: 0.1s;
        }
        .decode-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a05a1a; }

        /* 推理紀錄區 */
        .log-panel {
            margin-top: 25px;
            height: 320px;
            overflow-y: auto;
            background: #222;
            border-radius: 15px;
            padding: 10px;
            border: 2px solid #444;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .guess-val { font-size: 2.5rem; font-weight: bold; color: #fff; letter-spacing: 5px; width: 120px; }

        .signal-container {
            display: flex;
            gap: 15px;
        }

        /* 燈號+文字的組合 */
        .signal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #000; }
        .desc-text { font-size: 0.75rem; font-weight: bold; }

        .green { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .yellow { background: var(--warning); box-shadow: 0 0 10px var(--warning); }
        .red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        
        .txt-green { color: var(--success); }
        .txt-yellow { color: var(--warning); }
        .txt-red { color: var(--danger); }

        /* 彈窗 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .modal {
            background: #333; color: white; padding: 40px; border-radius: 30px; 
            max-width: 500px; width: 85%; text-align: center; border: 5px solid var(--accent);
        }
        .modal h2 { font-size: 2.5rem; color: var(--accent); margin-top: 0; }
        .modal p { font-size: 1.2rem; line-height: 1.6; color: #ccc; text-align: left; }
        .btn-start { padding: 15px 30px; font-size: 1.5rem; background: var(--success); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="overlay" id="briefing">
    <div class="modal">
        <h2>🔒 密室任務：三重鎖</h2>
        <p>
            基地進入封鎖狀態！請在 <b>5 分鐘</b> 內破解 <b>3 道門鎖</b>：<br><br>
            🟢 <b>綠色</b>：數字與位置完全正確 (位置正確)<br>
            🟡 <b>黃色</b>：數字對但位置不對 (數字正確)<br>
            🔴 <b>紅色</b>：該數字不在密碼中 (完全不對)<br><br>
            ⚠️ 注意：密碼可能包含重複數字。
        </p>
        <button class="btn-start" onclick="startMission()">接受任務</button>
    </div>
</div>

<div class="escape-container">
    <div class="header-info">
        <div id="round-text">門鎖：1 / 3</div>
        <div id="timer">05:00</div>
    </div>

    <h1>密室解碼</h1>

    <div class="lock-row">
        <input type="text" class="key-input" id="k1" maxlength="1" inputmode="numeric">
        <input type="text" class="key-input" id="k2" maxlength="1" inputmode="numeric">
        <input type="text" class="key-input" id="k3" maxlength="1" inputmode="numeric">
    </div>

    <button class="decode-btn" onclick="submitCode()">解碼</button>

    <div class="log-panel" id="history">
        <div style="color:#555; text-align:center; font-size:1.2rem; margin-top:100px;">偵測系統準備中...</div>
    </div>
</div>

<div class="overlay" id="end-screen" style="display:none;">
    <div class="modal">
        <h2 id="result-title">任務結束</h2>
        <p id="result-desc" style="text-align:center;"></p>
        <button class="btn-start" onclick="location.reload()" style="background:var(--accent)">重啟系統</button>
    </div>
</div>

<script>
    let currentRound = 1;
    let totalRounds = 3;
    let timeLeft = 300;
    let secretCode = [];
    let timerInterval;
    const inputs = [document.getElementById('k1'), document.getElementById('k2'), document.getElementById('k3')];

    inputs.forEach((box, i) => {
        box.oninput = () => { if(box.value && i < 2) inputs[i+1].focus(); };
        box.onkeydown = (e) => {
            if(e.key === 'Backspace' && !box.value && i > 0) inputs[i-1].focus();
            if(e.key === 'Enter') submitCode();
        };
    });

    function startMission() {
        document.getElementById('briefing').style.display = 'none';
        generateSecret();
        startTimer();
        inputs[0].focus();
    }

    function generateSecret() {
        secretCode = [0,0,0].map(() => Math.floor(Math.random() * 10));
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            if (timeLeft <= 0) gameOver(false);
        }, 1000);
    }

    function submitCode() {
        const guessStr = inputs.map(b => b.value).join('');
        if (guessStr.length < 3) return;

        let green = 0, yellow = 0;
        let sCheck = [...secretCode];
        let gCheck = guessStr.split('').map(Number);

        // 1. 綠燈邏輯
        gCheck.forEach((num, i) => {
            if (num === sCheck[i]) {
                green++; sCheck[i] = null; gCheck[i] = "X";
            }
        });

        // 2. 黃燈邏輯
        gCheck.forEach((num, i) => {
            if (num !== "X") {
                let fIdx = sCheck.indexOf(num);
                if (fIdx > -1) {
                    yellow++; sCheck[fIdx] = null;
                }
            }
        });

        updateLog(guessStr, green, yellow);
        inputs.forEach(b => b.value = "");
        inputs[0].focus();

        if (green === 3) nextRound();
    }

    function updateLog(guess, g, y) {
        let hist = document.getElementById('history');
        if (hist.innerHTML.includes("偵測系統")) hist.innerHTML = "";
        
        let div = document.createElement('div');
        div.className = 'log-item';
        
        let signalsHtml = "";
        if (g === 0 && y === 0) {
            signalsHtml = `
                <div class="signal-item">
                    <div class="dot red"></div>
                    <div class="desc-text txt-red">完全不對</div>
                </div>`;
        } else {
            for(let i=0; i<g; i++) {
                signalsHtml += `
                <div class="signal-item">
                    <div class="dot green"></div>
                    <div class="desc-text txt-green">位置正確</div>
                </div>`;
            }
            for(let i=0; i<y; i++) {
                signalsHtml += `
                <div class="signal-item">
                    <div class="dot yellow"></div>
                    <div class="desc-text txt-yellow">數字正確</div>
                </div>`;
            }
        }
        
        div.innerHTML = `<span class="guess-val">${guess}</span> <div class="signal-container">${signalsHtml}</div>`;
        hist.prepend(div);
    }

    function nextRound() {
        if (currentRound < totalRounds) {
            currentRound++;
            document.getElementById('round-text').innerText = `門鎖：${currentRound} / 3`;
            document.getElementById('history').innerHTML = `<div style="color:var(--success); text-align:center; font-size:1.5rem; margin-top:20px;">✓ 第一道門解鎖！進入下一關...</div>`;
            generateSecret();
        } else {
            gameOver(true);
        }
    }

    function gameOver(isWin) {
        clearInterval(timerInterval);
        document.getElementById('end-screen').style.display = 'flex';
        const title = document.getElementById('result-title');
        const desc = document.getElementById('result-desc');
        if (isWin) {
            title.innerText = "🏆 順利脫逃！";
            title.style.color = "var(--success)";
            desc.innerHTML = `密室門已全部開啟！<br>剩餘時間：${document.getElementById('timer').innerText}`;
        } else {
            title.innerText = "💀 任務失敗";
            title.style.color = "var(--danger)";
            desc.innerHTML = `氧氣耗盡... 挑戰失敗。<br>你只破解了 ${currentRound - 1} 個密碼。`;
        }
    }
</script>
</body>
</html>
