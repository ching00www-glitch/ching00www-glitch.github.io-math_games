<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極密室：全平台解碼任務</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22; 
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --panel: #34495e;
        }

        * { box-sizing: border-box; } /* 防止寬度爆出去 */

        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .escape-container {
            background: var(--panel);
            width: 100%;
            max-width: 600px; /* 電腦版最大寬度 */
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 4px solid #555;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
        }

        #timer { color: var(--danger); font-family: monospace; font-size: 1.8rem; font-weight: bold; }
        #round-text { color: var(--accent); font-size: 1.2rem; font-weight: bold; }

        h1 { font-size: calc(1.5rem + 1.5vw); margin: 5px 0; text-shadow: 0 0 10px var(--accent); }

        /* 響應式輸入框佈局 */
        .lock-row { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            margin: 20px 0; 
        }

        .key-input {
            width: 28%; /* 根據螢幕百分比分配 */
            max-width: 90px;
            height: 100px;
            font-size: 3.5rem;
            text-align: center;
            border: 3px solid #777;
            border-radius: 12px;
            background: #111;
            color: var(--accent);
            font-family: monospace;
            font-weight: bold;
        }

        .decode-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #a05a1a;
        }

        /* 推理紀錄區 - 適應手機高度 */
        .log-panel {
            margin-top: 20px;
            height: 250px;
            overflow-y: auto;
            background: #222;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #444;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .guess-val { font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; }

        .signal-container { display: flex; gap: 8px; }

        .signal-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }

        .dot { width: 22px; height: 22px; border-radius: 50%; }
        .desc-text { font-size: 0.65rem; font-weight: bold; }

        .green { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .yellow { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
        .red { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        .txt-green { color: var(--success); }
        .txt-yellow { color: var(--warning); }
        .txt-red { color: var(--danger); }

        /* 彈窗響應式 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100;
            padding: 20px;
        }
        .modal {
            background: #333; padding: 25px; border-radius: 20px; 
            width: 100%; max-width: 450px; text-align: center; border: 3px solid var(--accent);
        }
        .modal h2 { font-size: 2rem; color: var(--accent); margin-top: 0; }
        .modal p { font-size: 1rem; line-height: 1.5; text-align: left; }

        /* 手機版微調 */
        @media (max-width: 480px) {
            .escape-container { padding: 15px; }
            .key-input { height: 80px; font-size: 2.5rem; }
            .guess-val { font-size: 1.4rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="briefing">
    <div class="modal">
        <h2>🔒 任務：三重鎖</h2>
        <p>
            基地封鎖中！請在 <b>5 分鐘</b> 內破解 <b>3 道門鎖</b>：<br><br>
            🟢 <b>綠色</b>：位置與數字皆正確<br>
            🟡 <b>黃色</b>：數字正確但位置錯誤<br>
            🔴 <b>紅色</b>：該數字不在密碼中<br><br>
            ⚠️ 密碼可能包含重複數字。
        </p>
        <button class="decode-btn" onclick="startMission()" style="font-size: 1.2rem; padding: 10px;">接受任務</button>
    </div>
</div>

<div class="escape-container">
    <div class="header-info">
        <div id="round-text">門鎖：1 / 3</div>
        <div id="timer">05:00</div>
    </div>

    <h1>密室解碼</h1>

    <div class="lock-row">
        <input type="number" class="key-input" id="k1" oninput="if(value.length>1)value=value.slice(0,1)">
        <input type="number" class="key-input" id="k2" oninput="if(value.length>1)value=value.slice(0,1)">
        <input type="number" class="key-input" id="k3" oninput="if(value.length>1)value=value.slice(0,1)">
    </div>

    <button class="decode-btn" onclick="submitCode()">解碼</button>

    <div class="log-panel" id="history">
        <div style="color:#555; text-align:center; padding-top:80px;">等待輸入...</div>
    </div>
</div>

<div class="overlay" id="end-screen" style="display:none;">
    <div class="modal">
        <h2 id="result-title"></h2>
        <p id="result-desc" style="text-align:center;"></p>
        <button class="decode-btn" onclick="location.reload()" style="background:var(--accent); font-size: 1.2rem;">重新開始</button>
    </div>
</div>

<script>
    let currentRound = 1;
    let timeLeft = 300;
    let secretCode = [];
    let timerInterval;
    const inputs = [document.getElementById('k1'), document.getElementById('k2'), document.getElementById('k3')];

    inputs.forEach((box, i) => {
        box.onkeyup = (e) => {
            if(box.value && i < 2) inputs[i+1].focus();
            if(e.key === 'Backspace' && !box.value && i > 0) inputs[i-1].focus();
            if(e.key === 'Enter') submitCode();
        };
    });

    function startMission() {
        document.getElementById('briefing').style.display = 'none';
        generateSecret();
        startTimer();
        inputs[0].focus();
    }

    function generateSecret() {
        secretCode = [0,0,0].map(() => Math.floor(Math.random() * 10));
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            if (timeLeft <= 0) gameOver(false);
        }, 1000);
    }

    function submitCode() {
        const guessStr = inputs.map(b => b.value).join('');
        if (guessStr.length < 3) return;

        let green = 0, yellow = 0;
        let sCheck = [...secretCode];
        let gCheck = guessStr.split('').map(Number);

        gCheck.forEach((num, i) => {
            if (num === sCheck[i]) { green++; sCheck[i] = null; gCheck[i] = "X"; }
        });
        gCheck.forEach((num, i) => {
            if (num !== "X") {
                let fIdx = sCheck.indexOf(num);
                if (fIdx > -1) { yellow++; sCheck[fIdx] = null; }
            }
        });

        updateLog(guessStr, green, yellow);
        inputs.forEach(b => b.value = "");
        inputs[0].focus();
        if (green === 3) nextRound();
    }

    function updateLog(guess, g, y) {
        let hist = document.getElementById('history');
        if (hist.innerHTML.includes("等待")) hist.innerHTML = "";
        let div = document.createElement('div');
        div.className = 'log-entry';
        let signals = "";
        if (g === 0 && y === 0) {
            signals = `<div class="signal-item"><div class="dot red"></div><div class="desc-text txt-red">完全不對</div></div>`;
        } else {
            for(let i=0; i<g; i++) signals += `<div class="signal-item"><div class="dot green"></div><div class="desc-text txt-green">位置正確</div></div>`;
            for(let i=0; i<y; i++) signals += `<div class="signal-item"><div class="dot yellow"></div><div class="desc-text txt-yellow">數字正確</div></div>`;
        }
        div.innerHTML = `<span class="guess-val">${guess}</span><div class="signal-container">${signals}</div>`;
        hist.prepend(div);
    }

    function nextRound() {
        if (currentRound < 3) {
            currentRound++;
            document.getElementById('round-text').innerText = `門鎖：${currentRound} / 3`;
            document.getElementById('history').innerHTML = `<div style="color:var(--success); text-align:center; padding:10px;">✓ 門已解鎖！進入下一關...</div>`;
            generateSecret();
        } else { gameOver(true); }
    }

    function gameOver(isWin) {
        clearInterval(timerInterval);
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('result-title').innerText = isWin ? "🏆 順利脫逃！" : "💀 任務失敗";
        document.getElementById('result-desc').innerHTML = isWin ? `解鎖成功！剩餘時間：${document.getElementById('timer').innerText}` : "時間耗盡！";
    }
</script>
</body>
</html>
